kind = "web"
previewPath = "/"
title = "MedControl"
version = "1.0.0"
id = "artifacts/medcontrol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25490

[services.development]
run = "pnpm --filter @workspace/medcontrol run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medcontrol", "run", "build" ]
publicDir = "artifacts/medcontrol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25490"
BASE_PATH = "/"
