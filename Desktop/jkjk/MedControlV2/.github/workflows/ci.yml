name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Testes unitários
        run: pytest tests/test_service.py --tb=short -q

      - name: Testes de integração (mock — sempre)
        run: pytest tests/test_weather_integration.py -m "not integration" --tb=short -v

      - name: Testes de integração (API real)
        run: pytest tests/test_weather_integration.py -m "integration" --tb=short -v
