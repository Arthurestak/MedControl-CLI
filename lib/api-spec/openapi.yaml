openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MedControl API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: medications
    description: Medication management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /medications:
    get:
      operationId: listMedications
      tags: [medications]
      summary: List all medications
      description: Returns all registered medications
      responses:
        "200":
          description: List of medications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medication"
    post:
      operationId: createMedication
      tags: [medications]
      summary: Add a medication
      description: Register a new medication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationInput"
      responses:
        "201":
          description: Created medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "400":
          description: Validation error

  /medications/{id}:
    get:
      operationId: getMedication
      tags: [medications]
      summary: Get a medication by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medication found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "404":
          description: Medication not found
    patch:
      operationId: updateMedication
      tags: [medications]
      summary: Update a medication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationUpdate"
      responses:
        "200":
          description: Updated medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "404":
          description: Medication not found
    delete:
      operationId: deleteMedication
      tags: [medications]
      summary: Delete a medication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Medication deleted
        "404":
          description: Medication not found

  /medications/{id}/taken:
    patch:
      operationId: markMedicationTaken
      tags: [medications]
      summary: Toggle taken status
      description: Mark a medication as taken or reset it to pending
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TakenToggle"
      responses:
        "200":
          description: Updated medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "404":
          description: Medication not found

  /medications/summary:
    get:
      operationId: getMedicationSummary
      tags: [medications]
      summary: Get medication summary
      description: Returns counts of taken vs pending medications for the day
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Medication:
      type: object
      required: [id, name, scheduledTime, taken, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        scheduledTime:
          type: string
          description: Scheduled intake time (e.g. "08:00")
        taken:
          type: boolean
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    MedicationInput:
      type: object
      required: [name, scheduledTime]
      properties:
        name:
          type: string
          minLength: 1
        scheduledTime:
          type: string
          minLength: 1
        notes:
          type: string

    MedicationUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        scheduledTime:
          type: string
          minLength: 1
        notes:
          type: ["string", "null"]

    TakenToggle:
      type: object
      required: [taken]
      properties:
        taken:
          type: boolean

    MedicationSummary:
      type: object
      required: [total, taken, pending, takenPercent]
      properties:
        total:
          type: integer
        taken:
          type: integer
        pending:
          type: integer
        takenPercent:
          type: number
